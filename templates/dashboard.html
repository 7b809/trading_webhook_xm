<!DOCTYPE html>
<html>
<head>
<title>Alerts Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-4">

    <h2 class="mb-4">📊 Alerts Dashboard</h2>

    <!-- ✅ NEW: FILTER (does NOT affect existing table logic) -->
    <form method="get" class="row mb-3">

        <div class="col-md-4">
            <label class="form-label">Collection</label>
            <select name="collection" class="form-select">

                <!-- default old collection -->
                <option value="alerts" {% if current_collection == "alerts" %}selected{% endif %}>
                    alerts
                </option>

                <!-- dynamic collections -->
                {% for id, name in collections.items() %}
                <option value="{{ name }}" {% if name == current_collection %}selected{% endif %}>
                    {{ name }}
                </option>
                {% endfor %}

            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label">Limit</label>
            <input type="number" name="limit" value="{{ limit }}" class="form-control">
        </div>

        <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-primary w-100">Apply</button>
        </div>

    </form>

    <!-- ✅ EXISTING TABLE (UNCHANGED) -->
    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Text</th>
                <th>Type</th>
                <th>Time (IST)</th>
            </tr>
        </thead>
        <tbody>
            {% for alert in alerts %}
            <tr>
                <td>{{ alert.text }}</td>
                <td>{{ alert.type }}</td>
                <td>{{ alert.ist_time }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
